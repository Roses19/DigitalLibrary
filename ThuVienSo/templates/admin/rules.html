<div class="rules-page users-page">
    <div class="users-header">
        <div>
            <h1>Quản lý quy định thư viện</h1>
            <p>Thiết lập giới hạn mượn sách và gia hạn cho độc giả.</p>
        </div>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div id="flash-container">
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} flash-msg">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}

    <form method="POST"
          action="{{ url_for('admin_bp.manage_rules') }}"
          class="user-form-card rules-form-card">
        <div class="form-row">
            <div class="form-group">
                <label>Số sách tối đa / lần mượn</label>
                <input type="number"
                       name="max_books_per_borrow"
                       value="{{ rule.max_books_per_borrow if rule else 3 }}"
                       min="1"
                       required>
            </div>

            <div class="form-group">
                <label>Số ngày mượn tối đa</label>
                <input type="number"
                       name="max_borrow_days"
                       value="{{ rule.max_borrow_days if rule else 14 }}"
                       min="1"
                       required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Số lần gia hạn tối đa</label>
                <input type="number"
                       name="max_extend_times"
                       value="{{ rule.max_extend_times if rule else 1 }}"
                       min="0"
                       required>
            </div>
        </div>

        <div class="form-actions">
            <button class="btn-primary" type="submit">
                Lưu quy định
            </button>
        </div>
    </form>
</div>

<script>
window.addEventListener("DOMContentLoaded", function () {
    setTimeout(function () {
        document.querySelectorAll(".flash-msg").forEach(function (el) {
            el.style.transition = "0.5s";
            el.style.opacity = "0";
            el.style.transform = "translateY(-10px)";

            setTimeout(function () {
                el.remove();
            }, 500);
        });
    }, 3000);
});
</script>
