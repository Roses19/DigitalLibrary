<nav class="navbar">
    <div class="navbar-container">

        <div class="navbar-left">
            <a href="{{ url_for('home.index') }}" class="navbar-brand">
                Thư Viện Số
            </a>
        </div>

        <!-- CENTER -->
        <div class="navbar-links">
            <a href="{{ url_for('home.index') }}">Trang chủ</a>
            <a href="#">Giới thiệu</a>
            <a href="{{ url_for('book.search') }}">Sách</a>
            <a href="{{ url_for('book.categories') }}">Danh mục</a>
            <a href="#">Các chi nhánh thư viện</a>
        </div>

        <!-- RIGHT -->
        <div class="navbar-user">

                    <div class="user-dropdown-menu">

                <a href="{{ url_for('auth.login') }}">Đăng nhập</a>
