<div class="book-card">
    <a href="{{ url_for('book.detail', book_id=book.id) }}" class="book-card-link">
        <img src="{{ book.cover }}" alt="{{ book.title }}" class="book-card-cover">
        <div class="book-card-info">
            <h3 class="book-card-title">{{ book.title }}</h3>
            <p class="book-card-author">{{ book.author }}</p>
            <span class="book-card-category">{{ book.category }}</span>
            <span class="book-card-status {% if book.quantity > 0 %}available{% else %}unavailable{% endif %}">
                {% if book.quantity > 0 %}Còn sách{% else %}Hết sách{% endif %}
            </span>
        </div>
    </a>
</div>
