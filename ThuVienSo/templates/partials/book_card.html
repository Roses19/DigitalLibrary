<div class="book-card">
    <div class="book-cover-wrapper">
        {% if book.cover_image %}
            <img src="{{ book.cover_image }}" alt="{{ book.title }}" class="book-card-cover">
        {% else %}
            <img src="{{ url_for('static', filename='images/books/default-book.png') }}" alt="{{ book.title }}" class="book-card-cover">
        {% endif %}

        <span class="book-status-badge {% if book.available_quantity > 0 %}available{% else %}unavailable{% endif %}">
            {% if book.available_quantity > 0 %}
                Còn sách
            {% else %}
                Đã hết
            {% endif %}
        </span>
    </div>

    <div class="book-card-info">
        <h3 class="book-card-title">{{ book.title }}</h3>

        <p class="book-card-author">
            {{ book.authors | map(attribute='name') | join(', ') }}
        </p>

        <div class="book-card-actions">
            <a href=# class="btn-detail">
                Xem chi tiết
            </a>

            <a href=#" class="btn-borrow">
                Mượn sách
            </a>
        </div>
    </div>
</div>
