<form action="{{ url_for('book.search') }}" method="get" class="search-form">
    <div class="search-form-group">
        <input
            type="text"
            name="q"
            placeholder="Nhập từ khóa tìm kiếm (tên sách, tác giả, thể loại)..."
            value="{{ keyword if keyword is defined else '' }}"
            class="search-input"
            autofocus
        >
        <button type="submit" class="search-btn">Tìm kiếm</button>
    </div>
</form>
